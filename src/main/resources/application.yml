spring:
  application:
    name: kafkaapp

  lifecycle:
    timeout-per-shutdown-phase: 10s

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
    username: ${DB_USERNAME:sys}
    password: ${DB_PASSWORD:password}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: high-throughput-group
      auto-offset-reset: earliest
      max-poll-records: 50
      # Use JSON deserializer for messages
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: BATCH
      # The container will manage acknowledgments after the batch listener method returns.
      ack-mode: BATCH

server:
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      otlp:
        enabled: true
        # Defaults to localhost:4318 (HTTP OTLP endpoint of Splunk daemonset/sidecar in K8s)
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 10s
  tracing:
    sampling:
      probability: 1.0 # Sample 100% of transactions for fraud detection
    propagation:
      type: B3 # Use B3 or W3C standard based on Splunk preferences

# Format logs to include OpenTelemetry TraceID and SpanID automatically for Splunk Observability correlation
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

cxf:
  path: /services
  client:
    connection-timeout: 2500
    receive-timeout: 2500
