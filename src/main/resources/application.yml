spring:
  application:
    name: kafkaapp

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: high-throughput-group
      auto-offset-reset: earliest
      max-poll-records: 50
      # Use JSON deserializer for messages
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: BATCH
      # The container will manage acknowledgments after the batch listener method returns.
      ack-mode: BATCH

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//localhost:1521/ORCL}
    username: ${DB_USERNAME:sys}
    password: ${DB_PASSWORD:password}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

cxf:
  path: /services
  client:
    connection-timeout: 2500
    receive-timeout: 2500
